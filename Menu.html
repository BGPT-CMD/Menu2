<!DOCTYPE html>
<html>
<head>
  <title>Menu - A + B's Cafe</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: radial-gradient(circle at 30% 20%, #1a0033, #000010, #000000);
      overflow: hidden;
    }

    /* Stars (same vibe as homepage) */
    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      background: transparent;
      box-shadow:
        120px 80px white,
        250px 300px white,
        400px 150px white,
        600px 500px white,
        800px 200px white,
        1000px 600px white,
        1300px 300px white,
        1500px 700px white;
      animation: twinkle 6s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    .menu-box {
      position: relative;
      background: rgba(0, 0, 0, 0.65);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 2.5em;
    }

    .item {
      background: rgba(255, 255, 255, 0.08);
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      font-size: 1.1em;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 0 10px rgba(255,255,255,0.05);
    }

    .price {
      color: #ffd27d;
      font-weight: bold;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #ccc;
      text-decoration: none;
      transition: color 0.2s;
    }

    a:hover {
      color: white;
    }
  </style>
</head>
<body>

  <div class="menu-box">
    <h1>Menu ☕</h1>

    <div class="item">
      <span>Spit-Squirt Pre-Workout</span>
      <span class="price">$8</span>
    </div>

    <div class="item">
      <span>Breast Milk Latte</span>
      <span class="price">$25</span>
    </div>

    <div class="item">
      <span>Umbilical Cord Supps</span>
      <span class="price">$20</span>
    </div>

    <div class="item">
      <span>Placenta Tacos</span>
      <span class="price">$32</span>
    </div>

    <a href="index.html">← Back to Welcome</a>
  </div>

</body>
</html>
