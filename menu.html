<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu - A + B's Cafe</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 30% 20%, #1a0033, #000010, #000000);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 200%;
      height: 200%;
      box-shadow:
        120px 80px white,
        250px 300px white,
        400px 150px white,
        600px 500px white,
        800px 200px white,
        1000px 600px white,
        1300px 300px white,
        1500px 700px white;
      animation: twinkle 6s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.3; }
      to { opacity: 1; }
    }

    .menu-box {
      position: relative;
      width: min(92%, 380px);
      padding: 6vw;
      border-radius: 15px;
      background: rgba(0, 0, 0, 0.65);
      box-shadow: 0 0 30px rgba(255,255,255,0.15);
      text-align: center;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      margin-bottom: 20px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      font-size: clamp(0.9rem, 3.5vw, 1.1rem);
    }

    .price {
      color: #ffd27d;
      font-weight: bold;
    }

    a {
      display: inline-block;
      margin-top: 15px;
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
    }

    a:hover {
      color: white;
    }
  </style>
</head>

<body>

  <div class="menu-box">
    <h1>Menu ☕</h1>

    <div class="item">
      <span>Spit-Squirt Pre-Workout</span>
      <span class="price">$8</span>
    </div>

    <div class="item">
      <span>Breast Milk Latte</span>
      <span class="price">$25</span>
    </div>

    <div class="item">
      <span>Umbilical Cord Supps</span>
      <span class="price">$20</span>
    </div>

    <div class="item">
      <span>Placenta Tacos</span>
      <span class="price">$32</span>
    </div>

    <a href="./index.html">← Back</a>
  </div>

</body>
</html>
